<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SebUtils Configuration</title>
    <link rel="stylesheet" type="text/css" href="/styles.css">
</head>
<body>
<div class="container">
    <div class="header">
        <h1>SebUtils Configuration</h1>
        <p class="subtitle">Manage your SebUtils configuration</p>
    </div>

    <div class="menu-bar" id="menu-bar">
        <span class="menu-label">Jump to:</span>
        <button class="menu-btn" onclick="scrollToSection('quick-settings')">Quick Settings</button>
    </div>

    <div id="quick-settings" class="quick-settings">
        <h2 class="section-title">Quick Settings</h2>
        <div id="quick-settings-content"></div>
        <button class="save-btn" onclick="saveConfig()">Save Changes</button>
        <div id="status-message" class="status-message"></div>
    </div>

    <div id="config-groups"></div>
</div>

<script>
    let configData = {};
    const API_BASE = window.location.origin + "/api";

    async function loadConfig() {
        try {
            const response = await fetch(`${API_BASE}/config`);
            if (response.status === 401) {
                window.location = '/login.html';
                return;
            }
            configData = await response.json();
            renderDashboard();
        } catch (error) {
            console.error('Error loading config:', error);
            showStatus('Failed to load configuration', 'error');
        }
    }

    function renderDashboard() {
        renderQuickSettings();
        renderConfigGroups();
        renderMenuBar();
    }

    function renderMenuBar() {
        const groups = {};
        Object.entries(configData).forEach(([key, cfg]) => {
            groups[cfg.group] = true;
        });

        const menuBar = document.getElementById('menu-bar');
        const groupButtons = Object.keys(groups).sort().map(groupName =>
            `<button class="menu-btn" onclick="scrollToSection('${groupName}')">${capitalize(groupName)}</button>`
        ).join('');

        menuBar.innerHTML = `
                <span class="menu-label">Jump to:</span>
                <button class="menu-btn" onclick="scrollToSection('quick-settings')">Quick Settings</button>
                ${groupButtons}
            `;
    }

    function capitalize(str) {
        return str.charAt(0).toUpperCase() + str.slice(1);
    }

    function renderQuickSettings() {
        const container = document.getElementById('quick-settings-content');
        const toggles = Object.entries(configData).filter(([_, cfg]) => cfg.type === 'TOGGLE');

        container.innerHTML = toggles.map(([key, cfg]) => `
                <div class="config-item">
                    <span class="config-label">${cfg.displayName}</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="quick-${key}" 
                               ${cfg.value === 'true' ? 'checked' : ''}
                               onchange="updateValue('${key}', this.checked)">
                        <span class="power-button"></span>
                    </label>
                </div>
            `).join('');
    }

    function renderConfigGroups() {
        const container = document.getElementById('config-groups');
        const groups = {};

        Object.entries(configData).forEach(([key, cfg]) => {
            if (!groups[cfg.group]) groups[cfg.group] = [];
            groups[cfg.group].push([key, cfg]);
        });

        container.innerHTML = Object.entries(groups).map(([groupName, items]) => `
                <div id="${groupName}" class="config-group">
                    <h3 class="group-title">${groupName}</h3>
                    ${items.map(([key, cfg]) => renderConfigItem(key, cfg)).join('')}
                    <button class="save-btn" onclick="saveConfig()">Save Changes</button>
                </div>
            `).join('');
    }

    function renderConfigItem(key, cfg) {
        const inputId = `input-${key}`;
        let inputHtml = '';

        switch (cfg.type) {
            case 'TOGGLE':
                inputHtml = `
                        <label class="toggle-switch">
                            <input type="checkbox" id="${inputId}" 
                                   ${cfg.value === 'true' ? 'checked' : ''}
                                   onchange="updateValue('${key}', this.checked)">
                            <span class="power-button"></span>
                        </label>
                    `;
                break;
            case 'NUMBER':
                inputHtml = `
                        <input type="number" id="${inputId}" 
                               value="${cfg.value}"
                               onchange="updateValue('${key}', this.value)">
                    `;
                break;
            case 'SECURE_STRING':
                inputHtml = `
                        <div style="flex: 1; max-width: 300px;">
                            <input type="password" id="${inputId}" 
                                   value="${cfg.value}"
                                   onchange="updateValue('${key}', this.value)"
                                   placeholder="Enter secure value">
                            <div class="secure-indicator">Value is redacted for security</div>
                        </div>
                    `;
                break;
            default: // STRING
                inputHtml = `
                        <input type="text" id="${inputId}" 
                               value="${cfg.value}"
                               onchange="updateValue('${key}', this.value)">
                    `;
        }

        return `
                <div class="config-item">
                    <span class="config-label">${cfg.displayName}</span>
                    <div class="config-input">${inputHtml}</div>
                </div>
            `;
    }

    function updateValue(key, value) {
        if (configData[key]) {
            configData[key].value = value.toString();

            if (configData[key].type === 'TOGGLE') {
                const quickToggle = document.getElementById(`quick-${key}`);
                const groupToggle = document.getElementById(`input-${key}`);
                if (quickToggle) quickToggle.checked = value;
                if (groupToggle) groupToggle.checked = value;
            }
        }
    }

    async function saveConfig() {
        try {
            const updates = {};
            Object.entries(configData).forEach(([key, cfg]) => {
                updates[key] = cfg.value;
            });

            const response = await fetch(`${API_BASE}/config`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(updates)
            });

            if (response.ok) {
                showStatus('Configuration saved successfully!', 'success');
            } else {
                showStatus('Failed to save configuration', 'error');
            }
        } catch (error) {
            console.error('Error saving config:', error);
            showStatus('Error saving configuration', 'error');
        }
    }

    function showStatus(message, type) {
        const statusEl = document.getElementById('status-message');
        statusEl.textContent = message;
        statusEl.className = `status-message ${type}`;
        setTimeout(() => {
            statusEl.style.display = 'none';
        }, 3000);
    }

    function scrollToSection(sectionId) {
        document.getElementById(sectionId).scrollIntoView({
            behavior: 'smooth',
            block: 'start'
        });
    }

    loadConfig();
</script>
</body>
</html>
