<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Login - SebUtils</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            width: 360px;
        }

        h1 {
            margin-bottom: 12px;
            font-size: 20px;
            color: #111827
        }

        input {
            width: 100%;
            padding: 10px 12px;
            margin: 8px 0;
            border: 1px solid #e5e7eb;
            border-radius: 8px
        }

        button {
            width: 100%;
            padding: 10px 12px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer
        }

        .note {
            font-size: 13px;
            color: #6b7280;
            margin-top: 8px
        }
    </style>
</head>
<body>
<div class="box">
    <h1>Login to SebUtils</h1>
    <form action="/login" method="POST">
        <div>
            <label>Minecraft Username</label>
            <input name="username" required placeholder="Your Minecraft username"/>
        </div>
        <div>
            <label>One-Time Password</label>
            <input name="otp" required placeholder="8 character password"/>
        </div>
        <button type="submit">Login</button>
    </form>
    <div id="status" class="note"></div>
</div>
</body>
</html>
