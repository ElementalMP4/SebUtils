name: minecraft-server-stack
services:
  minecraft-server:
    image: itzg/minecraft-server
    tty: true
    stdin_open: true
    ports:
      - "25565:25565"
      - "2289:2289"
    environment:
      EULA: "TRUE"
      TYPE: "PAPER"
      VERSION: "26.1.2"
      MEMORY: "2G"
    volumes:
      - ./minecraft:/data
    depends_on:
      sebutils-database:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 25565"]
      interval: 30s
      timeout: 10s
      retries: 3
  sebutils-database:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: sebutils
      POSTGRES_PASSWORD: password
      POSTGRES_DB: sebutils
    volumes:
      - ./postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sebutils -d sebutils"]
      interval: 3s
      timeout: 5s
      retries: 5
  